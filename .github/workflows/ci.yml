name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'packages/poker-core/**'
              - 'apps/api/**'
              - 'apps/solver/**'
            web:
              - 'apps/web/**'
              - 'packages/ui-components/**'
              - 'packages/types/**'

  test-python:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install poker-core
        run: pip install -e packages/poker-core
      - name: Run tests
        run: python -m pytest packages/poker-core/tests/ -v --tb=short
      - name: Lint
        run: pip install ruff && ruff check packages/poker-core/src/ apps/api/

  test-web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx turbo type-check --filter=@gto/web
      - run: npx turbo test --filter=@gto/web
      - run: npx turbo build --filter=@gto/web
